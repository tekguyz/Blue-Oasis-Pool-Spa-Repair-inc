<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netlify Forms Detection</title>
</head>
<body>
  <!-- This file is used by Netlify to detect the form at build time -->
  <form 
    name="contact" 
    data-netlify="true" 
    netlify-honeypot="bot-field" 
    action="/forms.html" 
    method="POST" 
    enctype="multipart/form-data"
  >
    <input type="hidden" name="form-name" value="contact" />
    <input type="text" name="name" />
    <input type="tel" name="phone" />
    <select name="service">
      <option>Equipment Repair</option>
      <option>Leak Detection</option>
      <option>Heater Service</option>
      <option>Automation System</option>
      <option>Salt System Install</option>
      <option>Other / Not Sure</option>
    </select>
    <input type="text" name="address" />
    <textarea name="message"></textarea>
    <div style="display: none;">
      <label>Don't fill this out if you're human: <input name="bot-field" /></label>
    </div>
    <button type="submit">Send</button>
  </form>
</body>
</html>
